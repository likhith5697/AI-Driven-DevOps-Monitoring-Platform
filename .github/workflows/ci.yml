name: AI Observability CI-CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build Node service
      - name: Build Node Service
        run: docker build ./order-service -t node-service

      # Build Python agent
      - name: Build Python Agent
        run: docker build ./python-agent -t python-agent

      # Start Node stack (Node + Prometheus via docker-compose)
      - name: Start Stack
        run: docker compose --file order-service/docker-compose.yml up -d --build

      # Wait for Node API to start
      - name: Wait for Node API
        run: sleep 20

      # Test Node API endpoints
      - name: Test POST /api/orders
        run: |
          curl -X POST http://localhost:3000/api/orders \
          -H "Content-Type: application/json" \
          -d '{"item":"iphone","price":1800}'

      - name: Test GET /api/orders
        run: curl -f http://localhost:3000/api/orders

      - name: Test /metrics endpoint
        run: curl -f http://localhost:3000/metrics

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Go to home
            cd /home/ubuntu

            # Clone repo if missing
            if [ ! -d "AI-Driven-DevOps-Monitoring-Platform" ]; then
              git clone https://github.com/likhith5697/AI-Driven-DevOps-Monitoring-Platform.git
            fi

            cd AI-Driven-DevOps-Monitoring-Platform
            git pull origin main

            # Clean old Docker resources to prevent space issues
            docker system prune -af --volumes

            # Start Node stack via Docker Compose
            docker-compose -f order-service/docker-compose.yml down
            docker-compose -f order-service/docker-compose.yml up -d --build

            cd /home/ubuntu/AI-Driven-DevOps-Monitoring-Platform/python-agent

            # Build the Python agent image locally on EC2
            docker build -t python-agent .

            # Start Python agent separately with secret injected
            docker stop python-agent || true
            docker rm python-agent || true
            docker run -d --name python-agent \
              -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
              -p 5000:5000 \
              python-agent