name: AI Observability CI-CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Node Services
        run: docker build ./order-service -t node-service

      - name: Build Python Agent
        run: docker build ./python-agent -t python-agent

      - name: Start Stack
        run: docker compose -f order-service/docker-compose.yml up -d

      - name: Wait for Node API
        run: sleep 20

      - name: Test POST /api/orders
        run: |
          curl -X POST http://localhost:3000/api/orders \
          -H "Content-Type: application/json" \
          -d '{"item":"iphone","price":1800}'

      - name: Test GET /api/orders
        run: curl -f http://localhost:3000/api/orders

  deploy:
  needs: build-and-test
  runs-on: ubuntu-latest

  steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu

          if [ ! -d "AI-Driven-DevOps-Monitoring-Platform" ]; then
            git clone https://github.com/likhith5697/AI-Driven-DevOps-Monitoring-Platform.git
          fi

          cd AI-Driven-DevOps-Monitoring-Platform
          git pull origin main

          docker compose --file order-service/docker-compose.yml down
          docker compose --file order-service/docker-compose.yml up -d --build